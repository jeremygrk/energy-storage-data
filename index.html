<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国储能行业数据</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1923;
    --surface: #1a2736;
    --border: #2a3f55;
    --text: #e0e6ed;
    --text-secondary: #8899aa;
    --accent: #4da6ff;
    --accent2: #00d4aa;
    --accent3: #ff9f43;
    --accent4: #ff6b8a;
    --accent5: #a78bfa;
    --accent6: #38bdf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    text-align: center;
  }
  .header h1 { font-size: 1.6rem; font-weight: 600; color: #fff; }
  .header p { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .tab-btn {
    padding: 14px 32px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.95rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: #fff; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .container { max-width: 1300px; margin: 0 auto; padding: 24px 20px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .chart-wrapper h2 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .chart-wrapper canvas { width: 100%; max-height: 400px; }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) {
    .charts-grid { grid-template-columns: 1fr; }
    .tab-btn { padding: 12px 16px; font-size: 0.85rem; }
  }

  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .table-wrapper h2 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    padding: 20px 24px 0;
  }
  .table-scroll { overflow-x: auto; padding: 16px 24px 24px; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  thead th {
    background: #1e3044;
    color: var(--accent);
    padding: 10px 14px;
    text-align: right;
    font-weight: 600;
    position: sticky; top: 0;
    border-bottom: 2px solid var(--border);
  }
  thead th:first-child { text-align: left; min-width: 90px; }
  tbody td {
    padding: 8px 14px;
    text-align: right;
    border-bottom: 1px solid rgba(42,63,85,0.5);
    color: var(--text);
  }
  tbody td:first-child { text-align: left; color: var(--text-secondary); font-weight: 500; }
  tbody tr:hover { background: rgba(77,166,255,0.05); }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
  tbody tr:nth-child(even):hover { background: rgba(77,166,255,0.06); }

  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-secondary);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>

// ── Color palette for chart lines ──
const COLORS = ['#4da6ff','#00d4aa','#ff9f43','#ff6b8a','#a78bfa','#38bdf8','#fbbf24'];

// ── Helpers ──
function fmt(v) {
  if (v === null || v === undefined || v === '' || v === '-') return '-';
  if (typeof v === 'number') return v.toLocaleString('zh-CN', {maximumFractionDigits: 4});
  return v;
}

function num(v) {
  if (v === null || v === undefined || v === '' || v === '-') return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}

function datesFromRows(rows) { return rows.map(r => r[0]).filter(d => d); }

function makeDataset(label, data, color, hidden) {
  return { label, data, borderColor: color, backgroundColor: color + '20', borderWidth: 2, pointRadius: 2, pointHoverRadius: 5, tension: 0.3, fill: false, hidden: hidden || false };
}

const chartInstances = {};

function destroyChart(key) {
  if (chartInstances[key]) { chartInstances[key].destroy(); chartInstances[key] = null; }
}

// ── Tabs ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    // Redraw charts after display change
    setTimeout(() => {
      Object.keys(chartInstances).forEach(k => {
        if (chartInstances[k]) chartInstances[k].resize();
      });
    }, 50);
  });
});

// ── Build tables ──
function buildTable(containerId, headers, rows) {
  const h = headers.filter(h => h !== '');
  // If first header is empty, rows have date in first col
  const hasDateCol = headers[0] === '' || headers[0] === '占比' || headers[0].includes('平均报价');
  const useHeaders = hasDateCol ? headers.slice(1) : headers;

  let html = '<table><thead><tr>';
  if (hasDateCol) html += '<th>日期</th>';
  useHeaders.forEach(h => { html += '<th>' + h + '</th>'; });
  html += '</tr></thead><tbody>';

  rows.forEach(row => {
    html += '<tr>';
    if (hasDateCol) html += '<td>' + row[0] + '</td>';
    const dataCols = hasDateCol ? row.slice(1) : row;
    dataCols.forEach((v, i) => {
      if (i < useHeaders.length) html += '<td>' + fmt(v) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById(containerId).innerHTML = html;
}

// ── Build charts ──
function buildChart(canvasId, key, labels, datasets) {
  destroyChart(key);
  const ctx = document.getElementById(canvasId).getContext('2d');
  chartInstances[key] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#8899aa', usePointStyle: true, padding: 20, font: { size: 12 } }
        },
        tooltip: {
          backgroundColor: '#1a2736', borderColor: '#2a3f55', borderWidth: 1,
          titleColor: '#fff', bodyColor: '#e0e6ed',
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y !== null ? ctx.parsed.y.toLocaleString('zh-CN', {maximumFractionDigits: 4}) : '-')
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8899aa', maxTicksLimit: 20, font: { size: 10 } },
          grid: { color: 'rgba(42,63,85,0.3)' }
        },
        y: {
          ticks: { color: '#8899aa', font: { size: 11 } },
          grid: { color: 'rgba(42,63,85,0.3)' },
          beginAtZero: false
        }
      }
    }
  });
}

    datasets.push(makeDataset(d.headers[i], seriesData, COLORS[i-1], seriesData.every(v => v === null)));
  }
  buildChart('chart1', 'chart1', labels, datasets);
  buildTable('table1', d.headers, d.rows);
})();

// ── Render Tab 2: 占比 ──
(function() {
  const d = DATA['占比'];
  const labels = d.rows.map(r => r[0]);
  // Percentage chart: cols 1-5 (独立储能, 可再生能源储能, 集采, 用户侧, 火储联合)
  const pctDatasets = [];

  for (let i = 0; i < pctHeaders.length; i++) {
    const seriesData = d.rows.map(r => num(r[i+1]));

  buildChart('chart2a', 'chart2a', labels, pctDatasets);
  // Scale chart: cols 7-11 (独立储能, 可再生能源储能, 集采, 用户侧, 火储联合)
  const scaleDatasets = [];
  const scaleHeaders = d.headers.slice(7, 12);
  for (let i = 0; i < scaleHeaders.length; i++) {
    const seriesData = d.rows.map(r => num(r[i+7]));
    scaleDatasets.push(makeDataset(scaleHeaders[i], seriesData, COLORS[i], seriesData.every(v => v === 0 || v === null)));
  }
  buildChart('chart2b', 'chart2b', labels, scaleDatasets);
  // Combined table: show both percentage and scale sections
  const allHeaders = d.headers;
  buildTable('table2', allHeaders, d.rows);

(function() {
